name: Flutter Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./Gidro-new  # Munuň bilen papkaňyzy tapýar
        run: flutter pub get

      - name: Build APK
        working-directory: ./Gidro-new  # Munuň bilen build edýär
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Yoluny hem Gidro-new papkasyndan geçmeli
          path: Gidro-new/build/app/outputs/flutter-apk/app-release.apk
